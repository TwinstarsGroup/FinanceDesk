<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TwinStar — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/app.css" />
  <style>
    .login-divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; color: var(--text-3); font-size: 12px; }
    .login-divider::before, .login-divider::after { content: ''; flex: 1; height: 1px; background: #e5e7eb; }
    .error-msg { color: var(--danger); font-size: 12px; margin-top: 6px; display: none; }
  </style>
</head>
<body>
  <div class="login-page">
    <div style="text-align:center; margin-bottom: 32px;">
      <img src="logo.png" alt="TwinStar" style="width:160px;" />
    </div>
      </div>
    </div>

    <div class="login-card">
      <h1 style="font-size:20px;font-weight:700;margin-bottom:4px;">Welcome back</h1>
      <p style="font-size:13px;color:var(--text-2);margin-bottom:28px;">Sign in to your workspace</p>

      <div class="form-group mb-2">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@company.com" autocomplete="email" />
      </div>

      <div class="form-group mb-2">
        <label for="password">Password</label>
        <div style="position:relative;">
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
          <button type="button" id="toggle-pw" onclick="togglePw()" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-3);padding:4px;">
            <svg id="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <p id="error-msg" class="error-msg"></p>

      <button id="signin-btn" class="btn btn-primary w-full mt-2" style="justify-content:center;padding:11px;" onclick="signIn()">
        <span id="btn-label">Sign in</span>
        <span id="btn-spin" class="spinner hidden"></span>
      </button>

      <div class="login-divider">or</div>

      <button class="btn w-full" style="justify-content:center;gap:10px;" onclick="signInGoogle()">
        <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>

      <p style="font-size:11px;color:var(--text-3);text-align:center;margin-top:20px;">
        Secured by Supabase Auth · Hosted on GitHub Pages
      </p>
    </div>
  </div>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase.js"></script>
  <script>
    // Redirect if already logged in
    (async () => {
      const session = await getSession();
      if (session) window.location.href = 'dashboard.html';
    })();

    async function signIn() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errEl = document.getElementById('error-msg');
      const label = document.getElementById('btn-label');
      const spin  = document.getElementById('btn-spin');

      errEl.style.display = 'none';
      if (!email || !password) { showError('Please enter your email and password.'); return; }

      label.textContent = 'Signing in…';
      spin.classList.remove('hidden');
      document.getElementById('signin-btn').disabled = true;

      const { error } = await db.auth.signInWithPassword({ email, password });

      if (error) {
        showError(error.message);
        label.textContent = 'Sign in';
        spin.classList.add('hidden');
        document.getElementById('signin-btn').disabled = false;
      } else {
        window.location.href = 'dashboard.html';
      }
    }

    async function signInGoogle() {
      await db.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.origin + '/dashboard.html' }
      });
    }

    function showError(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function togglePw() {
      const pw = document.getElementById('password');
      pw.type = pw.type === 'password' ? 'text' : 'password';
    }

    // Allow Enter key
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') signIn();
    });
  </script>
</body>
</html>
